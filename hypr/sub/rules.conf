# windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

layerrule = match:namespace (qs-.*), no_anim on
layerrule = match:namespace selection, no_anim on
layerrule = match:namespace vicinae, blur on
layerrule = match:namespace launcher, blur on
windowrule = match:class jetbrains-rider, match:float 1, no_blur on, no_initial_focus on
windowrule = match:initial_class steam_app_431960, float on, maximize off, center on
windowrule = match:initial_class fluXis, float on, maximize off, center on, size 1600 900
